name: Test Suite

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run unit tests with coverage
        run: npm run test:unit -- --coverage

      - name: Upload coverage report
        if: always()
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

  integration-tests:
    name: Integration Tests (Vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: djmexxico_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Check for integration test files
        id: check-files
        run: |
          COUNT=$(find tests/integration -name "*.test.ts" -o -name "*.test.tsx" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No integration test files found — will skip remaining steps"
          fi

      - name: Setup Node.js
        if: steps.check-files.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-files.outputs.count != '0'
        run: npm ci

      - name: Setup test database schema
        if: steps.check-files.outputs.count != '0'
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/djmexxico_test
        run: |
          npx drizzle-kit push:pg --config drizzle.config.ts --force 2>&1 || true

      - name: Run integration tests
        if: steps.check-files.outputs.count != '0'
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/djmexxico_test
          CLERK_SECRET_KEY: ${{ secrets.TEST_CLERK_SECRET_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.TEST_STRIPE_SECRET_KEY }}
        run: npm run test:integration

      - name: Skip notice
        if: steps.check-files.outputs.count == '0'
        run: echo "Integration tests skipped — no files in tests/integration/ yet"

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Check for E2E test files
        id: check-files
        run: |
          COUNT=$(find tests/e2e -name "*.spec.ts" -o -name "*.spec.tsx" -o -name "*.test.ts" 2>/dev/null | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" -eq 0 ]; then
            echo "No E2E test files found — will skip remaining steps"
          fi

      - name: Setup Node.js
        if: steps.check-files.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-files.outputs.count != '0'
        run: npm ci

      - name: Install Playwright browsers (chromium only)
        if: steps.check-files.outputs.count != '0'
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        if: steps.check-files.outputs.count != '0'
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: steps.check-files.outputs.count != '0' && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Skip notice
        if: steps.check-files.outputs.count == '0'
        run: echo "E2E tests skipped — no files in tests/e2e/ yet"

  test-results:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, e2e-tests]
    if: always()

    steps:
      - name: Summarise results
        run: |
          echo "Unit Tests:        ${{ needs.unit-tests.result }}"
          echo "Integration Tests: ${{ needs.integration-tests.result }}"
          echo "E2E Tests:         ${{ needs.e2e-tests.result }}"
          if [ "${{ needs.unit-tests.result }}" = "failure" ]; then
            echo "Unit tests failed"
            exit 1
          fi
          if [ "${{ needs.integration-tests.result }}" = "failure" ]; then
            echo "Integration tests failed"
            exit 1
          fi
          if [ "${{ needs.e2e-tests.result }}" = "failure" ]; then
            echo "E2E tests failed"
            exit 1
          fi
          echo "All test suites passed or gracefully skipped"
