name: Post-Deploy Smoke Tests

on:
  workflow_run:
    workflows: ['Deploy to Cloudflare Workers']
    types: [completed]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test (defaults to production)'
        required: false
        default: 'https://djmexxico.com'

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    env:
      TARGET: ${{ github.event.inputs.target_url || 'https://djmexxico.com' }}

    steps:
      - name: Pre-flight connectivity check
        id: connectivity
        run: |
          echo "Checking connectivity to $TARGET ..."
          # Exit codes: 0=ok, 6=DNS fail, 7=connection refused, 28=timeout
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 --connect-timeout 5 "$TARGET" 2>/dev/null)
          CURL_EXIT=$?

          if [ $CURL_EXIT -eq 6 ]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Cannot resolve $TARGET — Cloudflare deploy likely skipped (CLOUDFLARE_API_TOKEN not yet configured). Smoke tests will be skipped."
          elif [ $CURL_EXIT -eq 7 ]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Connection refused at $TARGET — service may not be running yet. Smoke tests will be skipped."
          elif [ $CURL_EXIT -eq 28 ]; then
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Connection timed out reaching $TARGET. Smoke tests will be skipped."
          else
            echo "reachable=true" >> "$GITHUB_OUTPUT"
            echo "✅ $TARGET is reachable (HTTP $HTTP)"
          fi

      - name: Health check — /api/health
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 15 "$TARGET/api/health")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check returned HTTP $STATUS"
            exit 1
          fi
          echo "$BODY" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data.get('status') in ('healthy', 'degraded'), f'Unexpected status: {data}'
          assert 'checks' in data, 'No checks key'
          print('✅ Health endpoint OK')
          print(f'   DB:  {data[\"checks\"].get(\"database\", {})}')
          print(f'   R2:  {data[\"checks\"].get(\"r2\", {})}')
          "

      - name: Homepage loads
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET")
          [ "$STATUS" = "200" ] && echo "✅ Homepage OK" || (echo "❌ Homepage HTTP $STATUS" && exit 1)

      - name: Beats page loads
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/beats")
          [ "$STATUS" = "200" ] && echo "✅ /beats OK" || (echo "❌ /beats HTTP $STATUS" && exit 1)

      - name: Management page loads
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/management")
          [ "$STATUS" = "200" ] && echo "✅ /management OK" || (echo "❌ /management HTTP $STATUS" && exit 1)

      - name: Terms page loads
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/terms")
          [ "$STATUS" = "200" ] && echo "✅ /terms OK" || (echo "❌ /terms HTTP $STATUS" && exit 1)

      - name: Privacy page loads
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/privacy")
          [ "$STATUS" = "200" ] && echo "✅ /privacy OK" || (echo "❌ /privacy HTTP $STATUS" && exit 1)

      - name: Stripe webhook endpoint reachable
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -X HEAD "$TARGET/api/webhooks/stripe")
          ( [ "$STATUS" = "200" ] || [ "$STATUS" = "405" ] ) && echo "✅ Stripe webhook endpoint OK (HTTP $STATUS)" || (echo "❌ Stripe webhook HTTP $STATUS" && exit 1)

      - name: Security headers present
        if: steps.connectivity.outputs.reachable == 'true'
        run: |
          HEADERS=$(curl -s -I --max-time 10 "$TARGET")
          echo "$HEADERS" | grep -qi "strict-transport-security" && echo "✅ HSTS present" || echo "⚠️  Missing HSTS (configure in Cloudflare SSL/TLS settings)"
          echo "$HEADERS" | grep -qi "x-content-type-options" && echo "✅ X-Content-Type-Options present" || echo "⚠️  Missing X-Content-Type-Options"

      - name: Smoke tests skipped notice
        if: steps.connectivity.outputs.reachable != 'true'
        run: |
          echo "ℹ️  Smoke tests skipped — site not reachable at $TARGET"
          echo "ℹ️  To enable full smoke tests, configure CLOUDFLARE_API_TOKEN in:"
          echo "ℹ️    GitHub → Settings → Secrets and variables → Actions → New repository secret"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed — check Cloudflare Workers dashboard for logs"

    steps:
      - name: Health check — /api/health
        run: |
          echo "Testing $TARGET/api/health"
          RESPONSE=$(curl -s -w "\n%{http_code}" "$TARGET/api/health")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "Status: $STATUS"
          echo "Body: $BODY"

          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check returned HTTP $STATUS"
            exit 1
          fi

          # Verify response has expected keys
          echo "$BODY" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data.get('status') in ('healthy', 'degraded'), f'Unexpected status: {data}'
          assert 'checks' in data, 'No checks key in response'
          print('✅ Health endpoint structure valid')
          print(f'   DB: {data[\"checks\"].get(\"database\", {})}')
          print(f'   R2: {data[\"checks\"].get(\"r2\", {})}')
          "

      - name: Homepage loads
        run: |
          echo "Testing $TARGET"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ Homepage OK (HTTP $STATUS)"

      - name: Beats page loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET/beats")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /beats returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /beats OK (HTTP $STATUS)"

      - name: Management page loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET/management")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /management returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /management OK (HTTP $STATUS)"

      - name: Terms page loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET/terms")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /terms returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /terms OK (HTTP $STATUS)"

      - name: Privacy page loads
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$TARGET/privacy")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /privacy returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /privacy OK (HTTP $STATUS)"

      - name: Stripe webhook endpoint exists (HEAD)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X HEAD "$TARGET/api/webhooks/stripe")
          # 405 Method Not Allowed is acceptable (POST only endpoint)
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "405" ]; then
            echo "❌ /api/webhooks/stripe returned unexpected HTTP $STATUS"
            exit 1
          fi
          echo "✅ Stripe webhook endpoint reachable (HTTP $STATUS)"

      - name: Security headers present
        run: |
          HEADERS=$(curl -s -I "$TARGET")
          echo "$HEADERS"

          # Check for basic security headers set by Cloudflare
          if ! echo "$HEADERS" | grep -qi "x-content-type-options"; then
            echo "⚠️  Missing X-Content-Type-Options header"
          else
            echo "✅ X-Content-Type-Options present"
          fi

          if ! echo "$HEADERS" | grep -qi "strict-transport-security"; then
            echo "⚠️  Missing HSTS header (should be set by Cloudflare)"
          else
            echo "✅ HSTS present"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed after deploy to $TARGET"
          echo "Check Cloudflare Workers dashboard for error logs."
