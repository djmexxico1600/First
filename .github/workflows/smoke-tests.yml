name: Post-Deploy Smoke Tests

on:
  workflow_run:
    workflows: ['Deploy to Cloudflare Workers']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL to test (defaults to production)'
        required: false
        default: 'https://djmexxico.com'

jobs:
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    timeout-minutes: 5

    env:
      TARGET: ${{ github.event.inputs.target_url || 'https://djmexxico.com' }}

    steps:
      - name: Pre-flight connectivity check
        id: connectivity
        run: |
          echo "Checking connectivity to $TARGET ..."
          if curl -s -o /dev/null --max-time 10 --connect-timeout 5 "$TARGET" 2>/dev/null; then
            echo "reachable=true" >> "$GITHUB_OUTPUT"
            echo "✅ $TARGET is reachable"
          else
            echo "reachable=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Cannot reach $TARGET — CLOUDFLARE_API_TOKEN not configured yet, smoke tests will skip"
          fi

      - name: Health check — /api/health
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          echo "Testing $TARGET/api/health"
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 15 "$TARGET/api/health")
          BODY=$(echo "$RESPONSE" | head -n -1)
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $STATUS"
          echo "Body: $BODY"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check returned HTTP $STATUS"
            exit 1
          fi
          echo "$BODY" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data.get('status') in ('healthy', 'degraded'), f'Unexpected status: {data}'
          assert 'checks' in data, 'No checks key in response'
          print('✅ Health endpoint structure valid')
          print(f'   DB: {data[\"checks\"].get(\"database\", {})}')
          print(f'   R2: {data[\"checks\"].get(\"r2\", {})}')
          "

      - name: Homepage loads
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Homepage returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ Homepage OK (HTTP $STATUS)"

      - name: Beats page loads
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/beats")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /beats returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /beats OK (HTTP $STATUS)"

      - name: Management page loads
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/management")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /management returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /management OK (HTTP $STATUS)"

      - name: Terms page loads
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/terms")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /terms returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /terms OK (HTTP $STATUS)"

      - name: Privacy page loads
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$TARGET/privacy")
          if [ "$STATUS" != "200" ]; then
            echo "❌ /privacy returned HTTP $STATUS"
            exit 1
          fi
          echo "✅ /privacy OK (HTTP $STATUS)"

      - name: Stripe webhook endpoint exists (HEAD)
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 -X HEAD "$TARGET/api/webhooks/stripe")
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "405" ]; then
            echo "❌ /api/webhooks/stripe returned unexpected HTTP $STATUS"
            exit 1
          fi
          echo "✅ Stripe webhook endpoint reachable (HTTP $STATUS)"

      - name: Security headers present
        if: ${{ steps.connectivity.outputs.reachable == 'true' }}
        run: |
          HEADERS=$(curl -s -I --max-time 10 "$TARGET")
          echo "$HEADERS"
          echo "$HEADERS" | grep -qi "x-content-type-options" && echo "✅ X-Content-Type-Options present" || echo "⚠️  Missing X-Content-Type-Options"
          echo "$HEADERS" | grep -qi "strict-transport-security" && echo "✅ HSTS present" || echo "⚠️  Missing HSTS (configure in Cloudflare SSL/TLS)"

      - name: Smoke tests skipped notice
        if: ${{ steps.connectivity.outputs.reachable != 'true' }}
        run: |
          echo "ℹ️  Smoke tests skipped — $TARGET is not reachable"
          echo "ℹ️  Set CLOUDFLARE_API_TOKEN in GitHub → Settings → Secrets to enable full deploys"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Smoke tests failed after deploy to $TARGET"
          echo "Check Cloudflare Workers dashboard for error logs."
