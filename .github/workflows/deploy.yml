name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build for Cloudflare
        run: npm run build:cloudflare
        env:
          NODE_ENV: production
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_STRIPE_BEAT_LEASE_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_BEAT_LEASE_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_BEAT_EXCLUSIVE_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_BEAT_EXCLUSIVE_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_SUB_BASIC_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_SUB_BASIC_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_SUB_PRO_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_SUB_PRO_PRICE_ID }}
          NEXT_PUBLIC_STRIPE_SUB_VIP_PRICE_ID: ${{ secrets.NEXT_PUBLIC_STRIPE_SUB_VIP_PRICE_ID }}
          NEXT_PUBLIC_R2_ACCOUNT_ID: ${{ secrets.NEXT_PUBLIC_R2_ACCOUNT_ID }}
          NEXT_PUBLIC_R2_BUCKET_NAME: ${{ secrets.NEXT_PUBLIC_R2_BUCKET_NAME }}

      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Post-deploy health check
        run: |
          echo "Waiting 10 seconds for deployment to propagate..."
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.NEXT_PUBLIC_APP_URL }}/api/health")
          if [ "$STATUS" != "200" ]; then
            echo "❌ Health check failed with status $STATUS"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $STATUS)"
